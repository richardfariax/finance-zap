services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-zap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance
      POSTGRES_DB: finance_zap
    ports:
      - '5432:5432'
    volumes:
      - finance_zap_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U finance -d finance_zap']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WHISPER_MODEL_FILE: ${WHISPER_MODEL_FILE:-ggml-base.bin}
    container_name: finance-zap-app
    restart: unless-stopped
    ports:
      - '${PORT:-3009}:3009'
    environment:
      NODE_ENV: production
      PORT: 3009
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://finance:finance@postgres:5432/finance_zap?schema=public
      BAILEYS_AUTH_DIR: /data/baileys_auth
      MEDIA_STORAGE_DIR: /data/media
      DEFAULT_TIMEZONE: ${DEFAULT_TIMEZONE:-America/Sao_Paulo}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-pt-BR}
      TESSERACT_LANG: ${TESSERACT_LANG:-por+eng}
      WHISPER_LANG: ${WHISPER_LANG:-pt}
      WHISPER_PROMPT: ${WHISPER_PROMPT:-}
      RUN_SEED: ${RUN_SEED:-true}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - baileys_auth:/data/baileys_auth
      - media_storage:/data/media
    stdin_open: true
    tty: true

volumes:
  finance_zap_pg:
  baileys_auth:
  media_storage:
