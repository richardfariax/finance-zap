services:
  postgres:
    image: postgres:16-alpine
    container_name: finance-zap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance
      POSTGRES_DB: finance_zap
    ports:
      - '5432:5432'
    volumes:
      - finance_zap_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U finance -d finance_zap']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  finance_zap_pg:
